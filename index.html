<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6F1E7">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMTgwIDE4MCI+PHJlY3Qgd2lkdGg9IjE4MCIgaGVpZ2h0PSIxODAiIHJ4PSI0MCIgZmlsbD0iIzNBNUE2QiIvPjxnIGZpbGw9Im5vbmUiIHN0cm9rZT0iI0Y2RjFFNyIgc3Ryb2tlLXdpZHRoPSI5IiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxwYXRoIGQ9Ik00MiAxMDVsMjYgMjYgNTAtNjQiLz48L2c+PHRleHQgeD0iOTAiIHk9IjE1NSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjYiIGZvbnQtd2VpZ2h0PSI3MDAiIGZpbGw9IiNGNkYxRTciIHRleHQtYW5jaG9yPSJtaWRkbGUiPlJVTEU8L3RleHQ+PC9zdmc+">
<title>トレード記録</title>
<style>
  :root{
    --paper:#F6F1E7; --card:#FFFDF8; --ink:#2B2A26; --sub:#6E685C;
    --line:#E3DCCB; --lineStrong:#CFC6B0; --field:#FBF8F1;
    --accent:#3A5A6B; --accentSoft:#E7EDF0; --gain:#C0392B; --loss:#3F7A57;
    --buy:#C0392B; --buySoft:#F7EBE9; --sell:#3F7A57; --sellSoft:#EAF1ED;
    --warn:#C08A2D; --ondark:#FBF8F1;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
    --mono:"SF Mono","Roboto Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:var(--sans);cursor:pointer;}
  input,textarea,select{font-family:var(--sans);}
  input[type=number]{-moz-appearance:textfield;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .wrap{max-width:560px;margin:0 auto;padding:0 0 120px;}

  /* header */
  .hd{position:sticky;top:0;z-index:5;background:var(--paper);
    border-bottom:1px solid var(--line);padding:16px 18px 12px;
    display:flex;align-items:baseline;justify-content:space-between;}
  .hd-eyebrow{font-size:11px;letter-spacing:2px;color:var(--sub);font-weight:600;}
  .hd-title{font-size:20px;font-weight:700;margin-top:2px;}
  .tabs{display:flex;gap:6px;}
  .tab{border:1px solid var(--lineStrong);background:transparent;color:var(--sub);
    font-size:13px;font-weight:600;padding:7px 14px;border-radius:999px;min-height:36px;}
  .tab.active{border-color:var(--accent);background:var(--accent);color:var(--ondark);}

  /* generic */
  .pad{padding:8px 14px;}
  .pad2{padding:12px 14px;}
  .seclabel{font-size:12px;letter-spacing:1.5px;color:var(--sub);font-weight:700;margin:16px 2px 8px;}
  .seclabel.inline{margin:0;}
  .muted{font-size:13px;color:var(--sub);padding:4px 2px 8px;}
  .row{display:flex;gap:12px;}
  .field{margin-top:14px;}
  .field-label{font-size:12.5px;color:var(--sub);font-weight:600;margin-bottom:6px;}
  .input{width:100%;background:var(--field);border:1.5px solid var(--lineStrong);
    border-radius:10px;padding:12px;font-size:15px;color:var(--ink);outline:none;min-height:46px;}
  .input.num{font-family:var(--mono);}
  textarea.input{min-height:84px;resize:vertical;line-height:1.6;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .card-top{display:flex;align-items:baseline;justify-content:space-between;}
  .card-sym{font-size:17px;font-weight:700;}
  .card-date{font-size:12px;color:var(--sub);font-family:var(--mono);}
  .pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .pill{font-size:12px;color:var(--ink);background:var(--field);border:1px solid var(--line);
    border-radius:999px;padding:4px 10px;white-space:nowrap;}
  .pill.mono{font-family:var(--mono);}
  .tag{font-size:12px;font-weight:700;border-radius:999px;padding:3px 10px;
    white-space:nowrap;border:1.5px solid;display:inline-block;}
  .statusline{margin-top:10px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}

  .btn{border:none;border-radius:12px;font-size:16px;font-weight:700;min-height:50px;}
  .btn-primary{background:var(--accent);color:var(--ondark);flex:1;}
  .btn-primary-sm{background:var(--accent);color:var(--ondark);flex:1;min-height:44px;
    border:none;border-radius:10px;font-size:14px;font-weight:700;}
  .btn-secondary{width:100%;border:1.5px solid var(--accent);background:transparent;
    color:var(--accent);font-size:15px;font-weight:700;border-radius:12px;min-height:50px;}
  .btn-ghost{padding:0 20px;border:1.5px solid var(--lineStrong);background:transparent;
    color:var(--sub);font-size:15px;font-weight:600;border-radius:12px;min-height:50px;}
  .btn:disabled{opacity:.45;}

  .note-box{margin-top:10px;font-size:13px;color:var(--sub);background:var(--field);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;line-height:1.6;}

  /* side toggle */
  .sidetoggle{display:flex;background:var(--field);border:1px solid var(--line);
    border-radius:12px;padding:4px;margin-bottom:14px;}
  .sidetoggle button{flex:1;min-height:44px;border:none;border-radius:9px;
    font-size:15px;font-weight:700;background:transparent;color:var(--sub);}
  .sidetoggle button.buy.active{background:var(--gain);color:var(--ondark);}
  .sidetoggle button.sell.active{background:var(--loss);color:var(--ondark);}

  /* pullback */
  .pullback{display:flex;gap:8px;}
  .pullback button{flex:1;text-align:left;padding:11px 12px;min-height:44px;border-radius:10px;
    border:1.5px solid var(--lineStrong);background:var(--card);}
  .pullback button.active{border-color:var(--accent);background:var(--accentSoft);}
  .pullback .pb-t{font-size:14px;font-weight:700;color:var(--ink);}
  .pullback button.active .pb-t{color:var(--accent);}
  .pullback .pb-s{font-size:11px;color:var(--sub);margin-top:2px;line-height:1.4;}

  /* rule check */
  .rulehead{display:flex;align-items:baseline;justify-content:space-between;}
  .rulehead .status-clear{font-size:12px;color:var(--accent);font-weight:600;}
  .rulehead .status-viol{font-size:12px;color:var(--warn);font-weight:600;}
  .rulehint{font-size:12px;color:var(--sub);margin:4px 0 10px;}
  .rulerow{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:11px 0;border-bottom:1px solid var(--line);}
  .rulerow-txt{flex:1;min-width:0;}
  .rulerow-t{font-size:14.5px;font-weight:600;line-height:1.3;}
  .rulerow-s{font-size:11.5px;color:var(--sub);margin-top:2px;line-height:1.3;}
  .ox{display:flex;gap:6px;}
  .ox button{width:42px;height:44px;flex-shrink:0;border-radius:10px;font-size:18px;
    font-weight:700;border:1.5px solid var(--lineStrong);background:var(--card);color:var(--sub);}
  .ox button.on-o.active{border-color:var(--gain);background:var(--gain);color:var(--ondark);}
  .ox button.on-x.active{border-color:var(--loss);background:var(--loss);color:var(--ondark);}

  /* checkrow */
  .checkrow{width:100%;display:flex;align-items:center;gap:12px;text-align:left;
    padding:12px;min-height:44px;margin-bottom:8px;border-radius:10px;
    border:1.5px solid var(--lineStrong);background:var(--card);}
  .checkrow.on{border-color:var(--accent);background:var(--accentSoft);}
  .checkrow .box{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:15px;color:var(--ondark);
    background:transparent;border:1.5px solid var(--lineStrong);}
  .checkrow.on .box{background:var(--accent);border-color:var(--accent);}
  .checkrow .lbl{font-size:13.5px;line-height:1.5;color:var(--ink);}

  /* exit preview */
  .plprev{border-radius:12px;padding:14px 16px;margin-top:6px;display:flex;
    align-items:baseline;justify-content:space-between;}
  .plprev.win{background:#EEF4EF;border:1px solid #CADFCE;}
  .plprev.lose{background:#F6EBEA;border:1px solid #E7CFCB;}
  .plprev.neutral{background:var(--field);border:1px solid var(--line);}
  .plprev .lab{font-size:11px;color:var(--sub);letter-spacing:1px;}
  .plprev .big{font-family:var(--mono);font-size:26px;font-weight:700;}
  .plprev .pct{font-family:var(--mono);font-size:15px;}
  .plprev .held{font-size:12px;color:var(--sub);margin-top:2px;}

  /* stats */
  .statcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:14px;}
  .bar{height:9px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:8px;}
  .bar.thin{height:6px;}
  .bar > span{display:block;height:100%;border-radius:999px;transition:width .3s;}
  .plbox{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:8px;}
  .graderow{display:flex;align-items:center;justify-content:space-between;
    padding:8px 0;border-bottom:1px solid var(--line);}
  .gradehead{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;
    padding:0 0 6px;border-bottom:1px solid var(--lineStrong);}
  .gradehead span{font-size:10px;color:var(--sub);letter-spacing:.5px;}
  .graderow2{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;
    padding:9px 0;border-bottom:1px solid var(--line);}
  .gradehead .gh-pct,.graderow2 .gh-pct{min-width:62px;text-align:right;}
  .gradehead .gh-win,.graderow2 .gh-win{min-width:50px;text-align:right;}
  .gradehead .gh-pl,.graderow2 .gh-pl{min-width:84px;text-align:right;}

  /* bottom bar */
  .bottombar{position:fixed;left:0;right:0;bottom:0;z-index:6;
    background:linear-gradient(180deg,rgba(246,241,231,0) 0%,var(--paper) 30%);
    padding:20px 16px calc(18px + env(safe-area-inset-bottom));}
  .bottombar .inner{max-width:560px;margin:0 auto;display:flex;gap:10px;}

  /* toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--ondark);font-size:13.5px;padding:10px 18px;
    border-radius:16px;max-width:82%;text-align:center;line-height:1.5;z-index:20;
    box-shadow:0 6px 20px rgba(0,0,0,.18);}

  .empty{padding:48px 28px;text-align:center;}
  .empty-t{font-size:17px;font-weight:700;margin-bottom:8px;}
  .empty-b{font-size:14px;color:var(--sub);line-height:1.7;}
  .delbtn{min-height:44px;padding:0 14px;border-radius:10px;font-size:13px;font-weight:600;
    border:1px solid var(--lineStrong);background:transparent;color:var(--sub);}
  .delbtn.armed{border-color:var(--loss);background:var(--loss);color:var(--ondark);}
  .btn-edit{min-height:44px;padding:0 14px;border-radius:10px;font-size:13px;font-weight:600;
    border:1px solid var(--accent);background:transparent;color:var(--accent);}
  .hide{display:none !important;}
  .center{text-align:center;}
  .smallnote{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div>
      <div class="hd-eyebrow">RULE FIRST</div>
      <div class="hd-title" id="hdTitle">トレード記録</div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-screen="list">記録</button>
      <button class="tab" data-screen="history">履歴</button>
      <button class="tab" data-screen="stats">集計</button>
    </div>
  </div>
  <div id="main"></div>
</div>
<div class="bottombar hide" id="bottombar"><div class="inner" id="bottombarInner"></div></div>
<div id="toastHost"></div>

<script>
"use strict";

/* ============================================================
   IndexedDB ストレージ
   ============================================================ */
const DB_NAME = "tradeJournalDB";
const STORE = "trades";
let _db = null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE,{keyPath:"id"});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error||new Error("DBを開けない"));
  });
}
async function db(){ if(!_db) _db = await openDB(); return _db; }

async function dbGetAll(){
  const d = await db();
  return new Promise((resolve,reject)=>{
    const tx = d.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = ()=>resolve(req.result||[]);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbPut(t){
  const d = await db();
  return new Promise((resolve,reject)=>{
    const tx = d.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(t);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error||new Error("保存失敗"));
  });
}
async function dbDelete(id){
  const d = await db();
  return new Promise((resolve,reject)=>{
    const tx = d.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error);
  });
}
async function dbPutMany(list){
  const d = await db();
  return new Promise((resolve,reject)=>{
    const tx = d.transaction(STORE,"readwrite");
    const store = tx.objectStore(STORE);
    for(const t of list) store.put(t);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error||new Error("一括保存失敗"));
  });
}

/* ============================================================
   計算ヘルパ
   ============================================================ */
const RULE_KEYS = ["order","slope","trigger","calm"];

const RULE_LABELS = {
  buy:{
    order:{t:"20日線 ＞ 100日線", s:"中期が長期の上"},
    slope:{t:"5日線が上向き", s:"横ばい・微下げは×"},
    trigger:{t:"実体半分が5日線の上", s:"下から上抜けた足"},
    calm:{t:"荒れ相場でない", s:"指数の乱高下・有事でない"},
  },
  sell:{
    order:{t:"20日線 ＜ 100日線", s:"中期が長期の下"},
    slope:{t:"5日線が下向き", s:"横ばい・微上げは×"},
    trigger:{t:"実体半分が5日線の下", s:"上から下抜けた足"},
    calm:{t:"荒れ相場でない", s:"指数の乱高下・有事でない"},
  },
};
const PULLBACK_LABEL = {
  buy:{
    ideal:"5日線 ≥ 20日線", ideal_sub:"20日線を割らずに再上昇",
    allow:"5日線 ＜ 20日線あり", allow_sub:"20日線を割ってから再上昇",
  },
  sell:{
    ideal:"5日線 ≤ 20日線", ideal_sub:"20日線を超えずに再下落",
    allow:"5日線 ＞ 20日線あり", allow_sub:"20日線を超えてから再下落",
  },
};
const PULLBACK_PILL = {
  buy:{ ideal:"押し目 5≥20", allow:"押し目 5<20あり" },
  sell:{ ideal:"戻り 5≤20", allow:"戻り 5>20あり" },
};
function pbLabel(side,key){ return (PULLBACK_LABEL[side]||PULLBACK_LABEL.buy)[key]; }
function pbPill(side,pullback){ return (PULLBACK_PILL[side]||PULLBACK_PILL.buy)[pullback]; }
const EXIT_TRIGGER = {
  wick:{t:"上ヒゲの長い線", s:"陽線・陰線問わず、上に長いヒゲ"},
  bear2:{t:"陰線2本目", s:"陰線が2本続いた"},
  ma5:{t:"5日線を終値で割った", s:"短期リズムの崩れ"},
  other:{t:"その他", s:"上記以外（コメントを残す）"},
};
const EXIT_TRIGGER_KEYS = ["wick","bear2","ma5","other"];
/* 旧データ(単一文字列)も配列として読む */
function exitTrigList(t){
  if(Array.isArray(t.exitTriggers)) return t.exitTriggers;
  if(t.exitTrigger) return [t.exitTrigger];
  return [];
}
const SHORT_RULE = {
  order:"並び（20日線と100日線）", slope:"5日線の向き",
  trigger:"実体半分が5日線の外", calm:"荒れ相場でない",
};

function violationCount(r){ let n=0; for(const k of RULE_KEYS) if(r[k]===false) n++; return n; }
function uncheckedCount(r){ let n=0; for(const k of RULE_KEYS) if(r[k]==null) n++; return n; }
function isClean(r){ return RULE_KEYS.every(k=>r[k]===true); }

function calcPL(t){
  if(t.exitPrice==null||t.entryPrice==null) return null;
  const entry=Number(t.entryPrice), exit=Number(t.exitPrice), units=Number(t.units)||0;
  if(!entry||!units) return null;
  const diff = t.side==="buy" ? exit-entry : entry-exit;
  return { amount: diff*units*100, pct: (diff/entry)*100 };
}
function daysBetween(a,b){
  if(!a||!b) return null;
  const d1=new Date(a+"T00:00:00"), d2=new Date(b+"T00:00:00");
  return Math.round((d2-d1)/86400000);
}
function todayStr(){
  const d=new Date(); const off=d.getTimezoneOffset()*60000;
  return new Date(d-off).toISOString().slice(0,10);
}
function fmtYen(n){
  if(n==null) return "—";
  const r=Math.round(n); const s = r<0?"▲":r>0?"+":"±";
  return s+"¥"+Math.abs(r).toLocaleString("ja-JP");
}
function fmtPct(n){
  if(n==null) return "—";
  const s=n<0?"▲":n>0?"+":"±";
  return s+Math.abs(n).toFixed(2)+"%";
}
function cardBorderColor(v){ return v===0?"var(--gain)":v<=2?"var(--warn)":"var(--loss)"; }
function sideColor(side){ return side==="sell" ? "var(--sell)" : "var(--buy)"; }
function sideSoft(side){ return side==="sell" ? "var(--sellSoft)" : "var(--buySoft)"; }

function blankTrade(){
  return {
    id: Date.now()+"_"+Math.random().toString(36).slice(2,7),
    side:"buy", symbol:"", entryDate:todayStr(), entryPrice:"", units:"1",
    pullback:"ideal",
    rules:{order:null,slope:null,trigger:null,calm:null},
    exitDate:null, exitPrice:null, note:"",
    addedPosition:false, addReasoned:false, addReasonNote:"", exitTriggers:[], exitOtherNote:"",
  };
}
function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g,m=>(
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

/* ============================================================
   アプリ状態
   ============================================================ */
const App = {
  screen:"list",   // list | entry | exit | stats | history
  trades:[],
  draft:null,
  loaded:false,
  histSort:"date_desc", // date_desc | date_asc | pl_desc | pl_asc | plpct_desc | plpct_asc | side
  histFilter:{ side:null, pl:null, rule:null }, // side:buy/sell, pl:gain/loss, rule:clean/viol
  returnTo:"list", // entry/exit編集から戻る先
};

const $main = document.getElementById("main");
const $bottombar = document.getElementById("bottombar");
const $bottombarInner = document.getElementById("bottombarInner");
const $hdTitle = document.getElementById("hdTitle");
const $tabs = document.getElementById("tabs");
const $toastHost = document.getElementById("toastHost");

async function loadTrades(){
  try{
    const arr = await dbGetAll();
    arr.sort((a,b)=> a.entryDate<b.entryDate?1:-1);
    App.trades = arr;
  }catch(e){ App.trades=[]; }
}

function flash(msg){
  $toastHost.innerHTML = `<div class="toast">${esc(msg)}</div>`;
  clearTimeout(flash._t);
  flash._t = setTimeout(()=>{ $toastHost.innerHTML=""; }, 2600);
}

function go(screen){
  // entry/exit編集に入るとき、呼び出し元(list/history)を戻り先として記録
  if((screen==="entry"||screen==="exit") && (App.screen==="list"||App.screen==="history")){
    App.returnTo = App.screen;
  }
  App.screen=screen;
  render();
}

async function commitTrade(t, msg){
  try{
    await dbPut(t);
    await loadTrades();
    App.screen = App.returnTo || "list";
    render();
    flash(msg);
  }catch(e){
    flash("保存できなかった："+((e&&e.message)||"不明なエラー"));
  }
}
async function removeTrade(id){
  try{ await dbDelete(id); await loadTrades(); render(); flash("削除した"); }
  catch(e){ flash("削除できなかった："+((e&&e.message)||"不明")); }
}

/* ============================================================
   レンダリング
   ============================================================ */
function render(){
  // header
  $hdTitle.textContent =
    App.screen==="entry"?"エントリー記録":
    App.screen==="exit"?"イグジット記録":
    App.screen==="stats"?"集計":
    App.screen==="history"?"履歴":"トレード記録";
  // tabs visible only on list/history/stats
  const tabScreen = (App.screen==="list"||App.screen==="stats"||App.screen==="history");
  $tabs.style.display = tabScreen ? "flex" : "none";
  if(tabScreen){
    [...$tabs.children].forEach(b=>{
      b.classList.toggle("active", b.dataset.screen===App.screen);
    });
  }

  if(!App.loaded){ $main.innerHTML = `<div style="padding:40px;text-align:center;color:var(--sub)">読み込み中…</div>`; return; }

  if(App.screen==="list") renderList();
  else if(App.screen==="entry") renderEntry();
  else if(App.screen==="exit") renderExit();
  else if(App.screen==="stats") renderStats();
  else if(App.screen==="history") renderHistory();

  renderBottomBar();
}

function renderBottomBar(){
  if(App.screen==="list"){
    $bottombar.classList.remove("hide");
    $bottombarInner.innerHTML = `<button class="btn btn-primary" id="bbAdd">＋ エントリーを記録</button>`;
    document.getElementById("bbAdd").onclick = ()=>{ App.draft=blankTrade(); go("entry"); };
  } else if(App.screen==="stats"||App.screen==="history"){
    $bottombar.classList.remove("hide");
    $bottombarInner.innerHTML = `<button class="btn btn-secondary" id="bbBack">← 記録へ戻る</button>`;
    document.getElementById("bbBack").onclick = ()=> go("list");
  } else {
    $bottombar.classList.add("hide");
    $bottombarInner.innerHTML = "";
  }
}

/* ---------- 一覧 ---------- */
function renderList(){
  const open = App.trades.filter(t=>t.exitPrice==null);
  const closed = App.trades.filter(t=>t.exitPrice!=null);

  if(App.trades.length===0){
    $main.innerHTML = emptyHTML("まだ記録がない",
      "エントリーした取引を記録すると、ここに保有中として並ぶ。決済したら同じ取引にイグジットを追記する。");
    return;
  }

  let html = `<div class="pad">`;
  html += `<div class="seclabel">保有中 ${open.length>0?`（${open.length}）`:""}</div>`;
  html += open.length===0 ? `<div class="muted">保有中の取引はない。</div>`
        : open.map(openCardHTML).join("");
  html += `<div style="height:18px"></div>`;
  if(closed.length>0){
    html += `<button class="btn-secondary" id="goHistory" style="margin-top:4px">決済済み ${closed.length}件を履歴で見る →</button>`;
  } else {
    html += `<div class="seclabel">決済済み</div><div class="muted">決済済みの取引はまだない。</div>`;
  }
  html += `</div>`;
  $main.innerHTML = html;

  // wire buttons
  open.forEach(t=>{
    const ex=document.getElementById("exit_"+t.id);
    if(ex) ex.onclick=()=>{ startExit(t); };
    const ed=document.getElementById("edit_"+t.id);
    if(ed) ed.onclick=()=>{ startEntryEdit(t); };
  });
  const gh=document.getElementById("goHistory");
  if(gh) gh.onclick=()=>go("history");
  wireDeletes();
}

function cardTopHTML(t){
  return `<div class="card-top">
    <div class="card-sym">${esc(t.symbol||"（銘柄未入力）")}</div>
    <div class="card-date">${esc(t.entryDate)}</div></div>`;
}

function openCardHTML(t){
  const v=violationCount(t.rules), unchecked=uncheckedCount(t.rules);
  let status;
  if(unchecked>0) status=`<span class="tag" style="color:var(--warn);border-color:var(--warn)">未評価が${unchecked}項目</span>`;
  else if(v===0) status=`<span class="tag" style="color:var(--accent);border-color:var(--accent)">ルール通り</span>`;
  else status=`<span class="tag" style="color:var(--warn);border-color:var(--warn)">違反${v}項目</span>`;
  return `<div class="card" style="border-left:5px solid ${sideColor(t.side)};background:${sideSoft(t.side)}">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="display:inline-block;font-size:12px;font-weight:700;color:var(--ondark);background:${sideColor(t.side)};border-radius:6px;padding:3px 10px">${t.side==="buy"?"買い":"売り"}</span>
      <div style="font-size:12px;color:var(--sub);font-family:var(--mono)">${esc(t.entryDate)}</div>
    </div>
    <div style="font-size:17px;font-weight:700;margin-top:6px">${esc(t.symbol||"（銘柄未入力）")}</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-top:8px">
      <span style="font-size:12px;color:var(--sub)">エントリー</span>
      <span style="font-family:var(--mono);font-size:20px;font-weight:700">${Number(t.entryPrice).toLocaleString("ja-JP")}</span>
      <span style="font-size:12px;color:var(--sub)">${esc(t.units)}単元</span>
    </div>
    <div class="pills"><span class="pill">${pbPill(t.side,t.pullback)}</span></div>
    ${ruleSummaryHTML(t)}
    <div style="font-size:12px;color:var(--sub);margin-top:8px">想定撤退ライン＝5日線終値割れ</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-primary-sm" id="exit_${t.id}">イグジットを記録</button>
      <button class="btn-edit" id="edit_${t.id}">編集</button>
      ${delBtnHTML(t.id)}
    </div>
  </div>`;
}

function ruleSummaryHTML(t){
  const v=violationCount(t.rules), unchecked=uncheckedCount(t.rules);
  if(unchecked>0 && v===0){
    return `<div style="margin-top:10px"><span class="tag" style="color:var(--warn);border-color:var(--warn)">未評価が${unchecked}項目</span></div>`;
  }
  if(v===0){
    return `<div style="margin-top:10px"><span class="tag" style="color:var(--accent);border-color:var(--accent)">✓ ルール通り（全項目クリア）</span></div>`;
  }
  // 違反あり：4項目を展開、違反項目をハイライト・守った項目を控えめに
  const labels = RULE_LABELS[t.side]||RULE_LABELS.buy;
  const rows = RULE_KEYS.map(k=>{
    const val=t.rules[k];
    if(val===false){
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;background:var(--buySoft);border:1px solid var(--buy);margin-bottom:4px">
        <span style="color:var(--buy);font-weight:700;font-size:13px">×</span>
        <span style="font-size:13px;font-weight:600;color:var(--ink)">${labels[k].t}</span>
      </div>`;
    }
    const mark = val===true?"○":"–";
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 9px;opacity:.45;margin-bottom:4px">
      <span style="font-size:13px;color:var(--sub)">${mark}</span>
      <span style="font-size:13px;color:var(--sub)">${labels[k].t}</span>
    </div>`;
  }).join("");
  return `<div style="margin-top:10px">
    <div style="font-size:12px;font-weight:700;color:var(--buy);margin-bottom:6px">違反${v}項目</div>
    ${rows}
  </div>`;
}

function closedCardHTML(t){
  const v=violationCount(t.rules), pl=calcPL(t), held=daysBetween(t.entryDate,t.exitDate);
  const win = pl && pl.amount>=0;
  const col = win?"var(--gain)":"var(--loss)";
  let tags = "";
  if(t.addedPosition) tags+=`<span class="tag" style="color:${t.addReasoned?"var(--sub)":"var(--buy)"};border-color:${t.addReasoned?"var(--sub)":"var(--buy)"}">${t.addReasoned?"買い増しあり（根拠あり）":"根拠なき買い増し"}</span>`;
  exitTrigList(t).forEach(k=>{ if(EXIT_TRIGGER[k]) tags+=`<span class="tag" style="color:var(--sub);border-color:var(--sub)">出口：${EXIT_TRIGGER[k].t}</span>`; });
  return `<div class="card" style="border-left:5px solid ${sideColor(t.side)};background:${sideSoft(t.side)}">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="display:inline-block;font-size:12px;font-weight:700;color:var(--ondark);background:${sideColor(t.side)};border-radius:6px;padding:3px 10px">${t.side==="buy"?"買い":"売り"}</span>
      <div style="font-size:12px;color:var(--sub);font-family:var(--mono)">${esc(t.entryDate)}</div>
    </div>
    <div style="font-size:17px;font-weight:700;margin-top:6px">${esc(t.symbol||"（銘柄未入力）")}</div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-top:8px">
      <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${col}">${pl?fmtYen(pl.amount):"—"}</div>
      <div style="font-family:var(--mono);font-size:14px;color:${col}">${pl?fmtPct(pl.pct):""}</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:6px;margin-top:8px;font-family:var(--mono);font-size:14px">
      <span style="font-size:11px;color:var(--sub);font-family:var(--sans)">エントリー</span>${Number(t.entryPrice).toLocaleString("ja-JP")}
      <span style="color:var(--sub)">→</span>
      <span style="font-size:11px;color:var(--sub);font-family:var(--sans)">イグジット</span>${Number(t.exitPrice).toLocaleString("ja-JP")}
    </div>
    <div class="pills">
      <span class="pill">${pbPill(t.side,t.pullback)}</span>
      ${held!=null?`<span class="pill">${held}日保有</span>`:""}
    </div>
    ${ruleSummaryHTML(t)}
    ${tags?`<div class="statusline">${tags}</div>`:""}
    ${t.note?`<div class="note-box">${esc(t.note)}</div>`:""}
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
      <button class="btn-edit" id="editEntry_${t.id}">エントリー編集</button>
      <button class="btn-edit" id="editExit_${t.id}">イグジット編集</button>
      ${delBtnHTML(t.id)}
    </div>
  </div>`;
}

/* ---------- 削除ボタン（2段階） ---------- */
function delBtnHTML(id){ return `<button class="delbtn" data-del="${id}">削除</button>`; }
function wireDeletes(){
  document.querySelectorAll("[data-del]").forEach(btn=>{
    btn.onclick = ()=>{
      if(btn.classList.contains("armed")){ removeTrade(btn.dataset.del); }
      else{
        btn.classList.add("armed"); btn.textContent="本当に削除？";
        setTimeout(()=>{ if(btn.isConnected){ btn.classList.remove("armed"); btn.textContent="削除"; } },3000);
      }
    };
  });
}

/* ---------- エントリーフォーム ---------- */
function startEntryEdit(t){
  App.draft = { ...t, units:String(t.units), entryPrice:String(t.entryPrice), isEdit:true };
  go("entry");
}
function renderEntry(){
  const d = App.draft;
  const editing = !!d.isEdit;
  const labels = RULE_LABELS[d.side];
  const unchecked = uncheckedCount(d.rules), v = violationCount(d.rules);
  const statusRight = unchecked>0 ? "" :
    (v===0 ? `<span class="status-clear">全項目クリア</span>`
           : `<span class="status-viol">違反${v}項目</span>`);

  $main.innerHTML = `<div class="pad2">
    <div class="sidetoggle">
      <button class="buy ${d.side==="buy"?"active":""}" data-side="buy">買い</button>
      <button class="sell ${d.side==="sell"?"active":""}" data-side="sell">売り</button>
    </div>

    <div class="field"><div class="field-label">銘柄</div>
      <input class="input" id="f_symbol" value="${esc(d.symbol)}" placeholder="例）7203 トヨタ"></div>

    <div class="row">
      <div class="field" style="flex:1"><div class="field-label">エントリー日</div>
        <input class="input" id="f_entryDate" type="date" value="${esc(d.entryDate)}"></div>
      <div class="field" style="flex:1"><div class="field-label">単元数（×100株）</div>
        <input class="input num" id="f_units" type="number" min="1" step="1" inputmode="numeric" value="${esc(d.units)}"></div>
    </div>

    <div class="field"><div class="field-label">エントリー単価</div>
      <input class="input num" id="f_entryPrice" type="number" step="0.1" inputmode="decimal" style="font-size:18px" value="${esc(d.entryPrice)}" placeholder="株価"></div>

    <div class="field"><div class="field-label">${d.side==="sell"?"戻りの形":"押し目の形"}</div>
      <div class="pullback" id="f_pullback">
        <button data-pb="ideal" class="${d.pullback==="ideal"?"active":""}">
          <div class="pb-t">${pbLabel(d.side,"ideal")}</div><div class="pb-s">${pbLabel(d.side,"ideal_sub")}</div></button>
        <button data-pb="allow" class="${d.pullback==="allow"?"active":""}">
          <div class="pb-t">${pbLabel(d.side,"allow")}</div><div class="pb-s">${pbLabel(d.side,"allow_sub")}</div></button>
      </div></div>

    <div style="margin-top:16px">
      <div class="rulehead"><span class="seclabel inline">ルールチェック</span><span id="ruleStatus">${statusRight}</span></div>
      <div class="rulehint">守れた／破ったを正直に。</div>
      <div id="ruleList">${RULE_KEYS.map(k=>ruleRowHTML(k,labels[k],d.rules[k])).join("")}</div>
    </div>

    <div style="height:14px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" id="f_cancel">やめる</button>
      <button class="btn btn-primary" id="f_save">${editing?"保存する":"記録する"}</button>
    </div>
    <div class="smallnote center" id="f_hint"></div>
  </div>`;

  // wiring
  $main.querySelectorAll("[data-side]").forEach(b=>b.onclick=()=>{ d.side=b.dataset.side; renderEntry(); });
  $main.querySelectorAll("[data-pb]").forEach(b=>b.onclick=()=>{ d.pullback=b.dataset.pb; renderEntry(); });
  bindInput("f_symbol", val=>d.symbol=val);
  bindInput("f_entryDate", val=>d.entryDate=val);
  bindInput("f_units", val=>{ d.units=val; });
  bindInput("f_entryPrice", val=>{ d.entryPrice=val; });
  wireRuleButtons(d, ()=>renderEntry());

  document.getElementById("f_cancel").onclick=()=>go(App.returnTo);
  const saveBtn=document.getElementById("f_save");
  const refreshSave=()=>{
    const ok = d.symbol.trim() && Number(d.entryPrice)>0 && Number(d.units)>0;
    saveBtn.disabled=!ok;
    document.getElementById("f_hint").textContent = ok?"":"銘柄・単価・単元数を入れると記録できる。";
  };
  refreshSave();
  // re-check on input
  ["f_symbol","f_entryPrice","f_units"].forEach(id=>{
    document.getElementById(id).addEventListener("input",refreshSave);
  });
  saveBtn.onclick=()=>{
    if(saveBtn.disabled) return;
    const out = {...d}; delete out.isEdit;
    commitTrade(out, editing?"エントリーを更新した":"エントリーを記録した");
  };
}

function ruleRowHTML(k,label,val){
  return `<div class="rulerow">
    <div class="rulerow-txt">
      <div class="rulerow-t">${label.t}</div>
      <div class="rulerow-s">${label.s}</div>
    </div>
    <div class="ox" data-rule="${k}">
      <button class="on-o ${val===true?"active":""}" data-val="true">○</button>
      <button class="on-x ${val===false?"active":""}" data-val="false">×</button>
    </div>
  </div>`;
}
function wireRuleButtons(d, rerender){
  $main.querySelectorAll(".ox").forEach(group=>{
    const k=group.dataset.rule;
    group.querySelectorAll("button").forEach(btn=>{
      btn.onclick=()=>{ d.rules[k]=(btn.dataset.val==="true"); rerender(); };
    });
  });
}

/* ---------- イグジットフォーム ---------- */
function startExit(t){
  App.draft = {
    ...t,
    exitDate: t.exitDate||todayStr(),
    exitPrice: t.exitPrice==null?"":String(t.exitPrice),
    units: String(t.units),
    entryPrice: String(t.entryPrice),
    note: t.note||"",
    addedPosition: !!t.addedPosition,
    addReasoned: !!t.addReasoned,
    addReasonNote: t.addReasonNote||"",
    exitTriggers: exitTrigList(t).slice(),
    exitOtherNote: t.exitOtherNote||"",
    isExitEdit: t.exitPrice!=null,
  };
  go("exit");
}

function hasExitPrice(d){ return d.exitPrice!=="" && d.exitPrice!=null && Number(d.exitPrice)>0; }

function renderExit(){
  const d = App.draft;
  const editing = !!d.isExitEdit;
  function plPreview(){
    if(!hasExitPrice(d)){
      return `<div class="plprev neutral">

          <div class="big" style="color:var(--sub)">—</div>
        </div>
        <div style="text-align:right;max-width:55%">
          <div style="font-size:12px;color:var(--sub);line-height:1.5">イグジット単価を入れると計算される</div>
        </div>
      </div>`;
    }
    const pl = calcPL({...d, exitPrice:Number(d.exitPrice)});
    const held = daysBetween(d.entryDate,d.exitDate);
    const win = pl && pl.amount>=0;
    const col = win?"var(--gain)":"var(--loss)";
    return `<div class="plprev ${win?"win":"lose"}">
      <div>
        <div class="lab">損益（自動計算）</div>
        <div class="big" style="color:${col}">${pl?fmtYen(pl.amount):"—"}</div>
      </div>
      <div style="text-align:right">
        <div class="pct" style="color:${col}">${pl?fmtPct(pl.pct):""}</div>
        ${held!=null?`<div class="held">${held}日保有</div>`:""}

    </div>`;
  }
  function addPositionHTML(){

    const yesOn = d.addedPosition;
    let html = `<div class="pullback" style="flex-direction:column;gap:8px">
      <button data-add="no" class="${noOn?"active":""}" style="width:100%;display:flex;align-items:center;gap:10px">
        <span class="box" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ondark);background:${noOn?"var(--accent)":"transparent"};border:1.5px solid ${noOn?"var(--accent)":"var(--lineStrong)"}">${noOn?"✓":""}</span>
        <span style="text-align:left"><div class="pb-t">買い増し・ナンピンなし</div><div class="pb-s">単発のまま手仕舞った</div></span>
      </button>
      <button data-add="yes" class="${yesOn?"active":""}" style="width:100%;display:flex;align-items:center;gap:10px">
        <span class="box" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ondark);background:${yesOn?"var(--accent)":"transparent"};border:1.5px solid ${yesOn?"var(--accent)":"var(--lineStrong)"}">${yesOn?"✓":""}</span>
        <span style="text-align:left"><div class="pb-t">買い増し・ナンピンをした</div><div class="pb-s">エントリー後にポジションを足した</div></span>
      </button>
    </div>`;
    if(d.addedPosition){
      const r = d.addReasoned;
      html += `<div style="margin-top:10px">
        <button class="checkrow ${r?"on":""}" id="x_addReasoned">
          <span class="box">${r?"✓":""}</span>
          <span class="lbl">その買い増しには根拠があった（取り返したい等の衝動ではない）</span>
        </button>
        ${r
          ? `<div class="field" style="margin-top:10px"><div class="field-label">根拠のメモ（必須）</div>
             <input class="input" id="x_addReasonNote" value="${esc(d.addReasonNote)}" placeholder="例）想定どおり押し目を作って再上昇したので増し玉"></div>`
          : `<div class="rulehint" style="color:var(--loss)">根拠なき買い増しは禁止。チェックが付かない買い増しは要注意として記録される。</div>`}
      </div>`;
    }
    return html;
  }

  $main.innerHTML = `<div class="pad2">
    <div class="card" style="border-left:4px solid ${sideColor(d.side)}">
      ${cardTopHTML(d)}
      <div class="pills">
        <span class="pill">${d.side==="buy"?"買い":"売り"}</span>
        <span class="pill mono">建値 ${Number(d.entryPrice).toLocaleString("ja-JP")}</span>
        <span class="pill mono">${esc(d.units)}単元</span>
      </div>
      <div style="margin-top:10px;padding:10px 12px;background:var(--field);border:1px solid var(--line);border-radius:10px">
        <div style="font-size:11px;color:var(--sub);margin-bottom:3px">この取引の${d.side==="sell"?"戻り":"押し目"}</div>
        <div style="font-size:14px;font-weight:700">${pbLabel(d.side,d.pullback)}</div>

      </div>
    </div>

    <div class="row">
      <div class="field" style="flex:1"><div class="field-label">イグジット日</div>

      <div class="field" style="flex:1"><div class="field-label">イグジット単価</div>

      <div id="x_addPosition">${addPositionHTML()}</div>
    </div>

    <div id="x_exitForm">${exitTriggerHTML()}</div>

    <div class="field"><div class="field-label">反省メモ（任意）</div>
      <textarea class="input" id="x_note" placeholder="例）5日線終値割れで規律どおり撤退。粘らなかった。">${esc(d.note)}</textarea></div>

    <div style="height:6px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" id="x_cancel">やめる</button>
      <button class="btn btn-primary" id="x_save">${editing?"保存する":"イグジットを記録"}</button>
    </div>
    <div class="smallnote center" id="x_hint"></div>
  </div>`;

  bindInput("x_exitDate", val=>{ d.exitDate=val; refreshPreviewAndExit(); });
  bindInput("x_exitPrice", val=>{ d.exitPrice=val; refreshPreviewAndExit(); });
  bindInput("x_note", val=>d.note=val);
  wireAddPosition();
  wireExitTrigger();

  function wireAddPosition(){
    $main.querySelectorAll("[data-add]").forEach(b=>{
      b.onclick=()=>{
        const yes = b.dataset.add==="yes";
        d.addedPosition = yes;
        if(!yes){ d.addReasoned=false; d.addReasonNote=""; }
        document.getElementById("x_addPosition").innerHTML=addPositionHTML();
        wireAddPosition();
        refreshSave();
      };
    });
    const rb=document.getElementById("x_addReasoned");
    if(rb) rb.onclick=()=>{
      d.addReasoned=!d.addReasoned;
      if(!d.addReasoned) d.addReasonNote="";
      document.getElementById("x_addPosition").innerHTML=addPositionHTML();
      wireAddPosition();
      refreshSave();
    };
    const rn=document.getElementById("x_addReasonNote");
    if(rn) rn.addEventListener("input", e=>{ d.addReasonNote=e.target.value; refreshSave(); });
  }

  document.getElementById("x_cancel").onclick=()=>go(App.returnTo);
  const saveBtn=document.getElementById("x_save");
  function refreshSave(){
    const trigOk = d.exitTriggers.length>0 && (!d.exitTriggers.includes("other") || d.exitOtherNote.trim());
    const addOk = !(d.addedPosition && d.addReasoned) || d.addReasonNote.trim();
    const ok = hasExitPrice(d) && d.exitDate && trigOk && addOk;
    saveBtn.disabled = !ok;
    const hint=document.getElementById("x_hint");
    if(hint){
      if(hasExitPrice(d) && d.exitDate && d.exitTriggers.length===0) hint.textContent="出口の形を選ぶと記録できる。";
      else if(d.exitTriggers.includes("other") && !d.exitOtherNote.trim()) hint.textContent="「その他」はコメントを入れると記録できる。";
      else if(d.addedPosition && d.addReasoned && !d.addReasonNote.trim()) hint.textContent="根拠のメモを入れると記録できる。";
      else hint.textContent="";
    }
  }
  function refreshPreviewAndExit(){
    document.getElementById("x_preview").innerHTML=plPreview();
    document.getElementById("x_exitForm").innerHTML=exitTriggerHTML();
    wireExitTrigger();
    refreshSave();
  }
  refreshSave();
  document.getElementById("x_exitDate").addEventListener("input",refreshSave);
  saveBtn.onclick=()=>{
    if(saveBtn.disabled) return;
    const out = {...d, exitPrice:Number(d.exitPrice)};
    if(!out.exitTriggers.includes("other")) out.exitOtherNote="";
    if(!out.addedPosition){ out.addReasoned=false; out.addReasonNote=""; }
    else if(!out.addReasoned){ out.addReasonNote=""; }
    delete out.isExitEdit; delete out._autoMa5; delete out.exitTrigger;
    commitTrade(out, editing?"イグジットを更新した":"イグジットを記録した");
  };

  function exitTriggerHTML(){
    if(!hasExitPrice(d)) return "";
    d._autoMa5=false;
    const pl = calcPL({...d, exitPrice:Number(d.exitPrice)});
    const isLoss = pl && pl.amount<0;
    const disabledKeys = isLoss ? ["wick","bear2"] : [];
    // 損切りで非活性の選択肢が選ばれていたら外す
    if(disabledKeys.length){
      d.exitTriggers = d.exitTriggers.filter(k=>!disabledKeys.includes(k));

    return `<div style="margin-top:16px">
      <span class="seclabel inline">出口の形</span>
      <div class="rulehint">${isLoss?"損切りで降りた形を選ぶ（上ヒゲ・陰線2本目は損切りでは選べない）。":"どの形で降りたか。当てはまるものを複数選べる。"}</div>
      <div class="pullback" style="flex-direction:column;gap:8px" id="x_trigGroup">
        ${EXIT_TRIGGER_KEYS.map(k=>{

              <span class="box" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--lineStrong)"></span>
              <span style="text-align:left"><div class="pb-t" style="color:var(--sub)">${EXIT_TRIGGER[k].t}</div><div class="pb-s">損切りでは選択不可</div></span>
            </div>`;
          }
          return `<button data-trig="${k}" class="${on?"active":""}" style="width:100%;display:flex;align-items:center;gap:10px">
            <span class="box" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ondark);background:${on?"var(--accent)":"transparent"};border:1.5px solid ${on?"var(--accent)":"var(--lineStrong)"}">${on?"✓":""}</span>
            <span style="text-align:left"><div class="pb-t">${EXIT_TRIGGER[k].t}</div><div class="pb-s">${EXIT_TRIGGER[k].s}</div></span>
          </button>`;
        }).join("")}
      </div>
      ${showOther?`<div class="field" style="margin-top:10px"><div class="field-label">その他の内容（必須）</div>
        <input class="input" id="x_otherNote" value="${esc(d.exitOtherNote)}" placeholder="どんな形・理由で降りたか"></div>`:""}
    </div>`;
  }
  function wireExitTrigger(){
    $main.querySelectorAll("[data-trig]").forEach(b=>{
      b.onclick=()=>{
        const k=b.dataset.trig;
        const i=d.exitTriggers.indexOf(k);
        if(i>=0) d.exitTriggers.splice(i,1); else d.exitTriggers.push(k);
        d._autoMa5=false;
        document.getElementById("x_exitForm").innerHTML=exitTriggerHTML();
        wireExitTrigger();
        refreshSave();
      };
    });
    const on=document.getElementById("x_otherNote");
    if(on) on.addEventListener("input", e=>{ d.exitOtherNote=e.target.value; refreshSave(); });
  }
}

function toggleCheck(id, fn){ const el=document.getElementById(id); if(el) el.onclick=fn; }
function bindInput(id, fn){ const el=document.getElementById(id); if(el) el.addEventListener("input", e=>fn(e.target.value)); }

/* ---------- 集計 ---------- */
function agg(arr){
  const pls = arr.map(calcPL).filter(Boolean);
  const n=pls.length, sum=pls.reduce((s,p)=>s+p.amount,0);
  const wins=pls.filter(p=>p.amount>=0).length;
  return { n, sum, avg:n?sum/n:0, winRate:n?wins/n:0 };
}
/* ---------- 履歴 ---------- */
const HIST_SORT_OPTIONS = [
  {k:"date_desc", label:"日付（新しい順）"},
  {k:"date_asc", label:"日付（古い順）"},
  {k:"pl_desc", label:"損益（高い順）"},
  {k:"pl_asc", label:"損益（低い順）"},
  {k:"plpct_desc", label:"損益％（高い順）"},
  {k:"plpct_asc", label:"損益％（低い順）"},
  {k:"side", label:"買い／売り"},
];
function sortHistory(list, sortKey){
  const arr = list.slice();
  const plOf = t=>{ const p=calcPL(t); return p?p.amount:0; };
  const pctOf = t=>{ const p=calcPL(t); return p?p.pct:0; };
  const dateOf = t=> t.exitDate||t.entryDate||"";
  switch(sortKey){
    case "date_asc": arr.sort((a,b)=> dateOf(a)<dateOf(b)?-1:dateOf(a)>dateOf(b)?1:0); break;
    case "pl_desc": arr.sort((a,b)=> plOf(b)-plOf(a)); break;
    case "pl_asc": arr.sort((a,b)=> plOf(a)-plOf(b)); break;
    case "plpct_desc": arr.sort((a,b)=> pctOf(b)-pctOf(a)); break;
    case "plpct_asc": arr.sort((a,b)=> pctOf(a)-pctOf(b)); break;
    case "side": arr.sort((a,b)=> (a.side===b.side)?0:(a.side==="buy"?-1:1)); break;
    case "date_desc":
    default: arr.sort((a,b)=> dateOf(a)>dateOf(b)?-1:dateOf(a)<dateOf(b)?1:0); break;
  }
  return arr;
}
function applyHistFilter(list){
  const f=App.histFilter;
  return list.filter(t=>{
    if(f.side && t.side!==f.side) return false;
    if(f.pl){
      const pl=calcPL(t); const amt=pl?pl.amount:0;
      if(f.pl==="gain" && amt<0) return false;
      if(f.pl==="loss" && amt>=0) return false;
    }
    if(f.rule){
      const clean=isClean(t.rules);
      if(f.rule==="clean" && !clean) return false;
      if(f.rule==="viol" && clean) return false;
    }
    return true;
  });
}
function histChipHTML(group,val,label){
  const on = App.histFilter[group]===val;
  return `<button data-fil="${group}" data-val="${val}" style="flex:1;border:1.5px solid ${on?"var(--accent)":"var(--lineStrong)"};background:${on?"var(--accent)":"transparent"};color:${on?"var(--ondark)":"var(--sub)"};font-size:13px;font-weight:600;padding:9px 14px;border-radius:10px;min-height:40px">${label}</button>`;
}

      </div>

      </div>

    ${anyFilter?`<button id="histClear" style="border:none;background:transparent;color:var(--accent);font-size:12px;font-weight:600;padding:2px 2px;margin:0 0 8px">× フィルタを解除</button>`:""}
    <div style="display:flex;align-items:center;gap:10px;margin:4px 2px 12px">
      <span style="font-size:12px;color:var(--sub);font-weight:600;white-space:nowrap">並べ替え</span>

    <div style="font-size:12px;color:var(--sub);margin:0 2px 10px">${sorted.length}件${sorted.length!==closed.length?` / 全${closed.length}件`:""}</div>
    ${sorted.length===0?`<div class="muted">条件に合う取引がない。</div>`:sorted.map(closedCardHTML).join("")}
  </div>`;
  // フィルタチップ
  $main.querySelectorAll("[data-fil]").forEach(b=>{
    b.onclick=()=>{
      const g=b.dataset.fil, v=b.dataset.val;
      App.histFilter[g] = (App.histFilter[g]===v) ? null : v;
      renderHistory();
    };
  });
  const clr=document.getElementById("histClear");
  if(clr) clr.onclick=()=>{ App.histFilter={side:null,pl:null,rule:null}; renderHistory(); };
  document.getElementById("histSort").onchange=(e)=>{ App.histSort=e.target.value; renderHistory(); };
  // 編集・削除の配線
  sorted.forEach(t=>{
    const ee=document.getElementById("editEntry_"+t.id);
    if(ee) ee.onclick=()=>{ startEntryEdit(t); };
    const ex=document.getElementById("editExit_"+t.id);
    if(ex) ex.onclick=()=>{ startExit(t); };
  });
  wireDeletes();
}

      + `<div class="pad"><button class="btn-secondary" id="st_restore_empty">⬆ バックアップから復元する</button>

    if(rb) rb.onclick=()=>importJSONFile();

  }

  const total=trades.length;
  const cleanCount=trades.filter(t=>isClean(t.rules)).length;
  const compliance= total?cleanCount/total:0;
  const cleanAgg=agg(closed.filter(t=>isClean(t.rules)));
  const dirtyAgg=agg(closed.filter(t=>!isClean(t.rules)));
  const violByRule={}; RULE_KEYS.forEach(k=> violByRule[k]=trades.filter(t=>t.rules[k]===false).length);

    many:agg(closed.filter(t=>violationCount(t.rules)>=3)),
  };
  const byPull={ ideal:agg(closed.filter(t=>t.pullback==="ideal")), allow:agg(closed.filter(t=>t.pullback==="allow")) };
  const byExit={};
  EXIT_TRIGGER_KEYS.forEach(k=> byExit[k]=agg(closed.filter(t=>exitTrigList(t).includes(k))));
  const totalAgg=agg(closed);
  const addedClosed=closed.filter(t=>t.addedPosition);
  const byAdd={
    none:agg(closed.filter(t=>!t.addedPosition)),
    reasoned:agg(closed.filter(t=>t.addedPosition && t.addReasoned)),
    unreasoned:agg(closed.filter(t=>t.addedPosition && !t.addReasoned)),

  $main.innerHTML = `<div class="pad">

      <div style="display:flex;align-items:baseline;gap:10px;margin-top:6px">
        <div style="font-family:var(--mono);font-size:38px;font-weight:700;color:var(--ink)">${totalAgg.n===0?"—":pct(totalAgg.winRate)}</div>
        <div style="font-size:13px;color:var(--sub)">勝率</div>
      </div>

        <span>損益</span>
        <span style="font-family:var(--mono);font-size:16px;font-weight:600;color:${totalAgg.n===0?"var(--sub)":(totalAgg.sum>=0?"var(--gain)":"var(--loss)")}">${totalAgg.n===0?"—":fmtYen(totalAgg.sum)}</span>
      </div>
    </div>

    <div class="statcard">
      <div style="font-size:12px;color:var(--sub);letter-spacing:1px">ルール遵守率（全項目○の割合）</div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-top:6px">
        <div style="font-family:var(--mono);font-size:38px;font-weight:700;color:var(--accent)">${total===0?"—":pct(compliance)}</div>
        <div style="font-size:13px;color:var(--sub)">${cleanCount} / ${total} トレード</div>
      </div>
      ${barHTML(compliance,"var(--accent)")}
      <div style="font-size:12px;color:var(--sub);margin-top:8px;line-height:1.6">評価軸はここ。勝ち負けではなく、守れた回数で自分を見る。</div>

    <div class="seclabel">押し目・戻りの形 × 成績</div>
    <div class="statcard">
      ${gradeTableHTML([
        {label:"理想の形（20日線を割らず／超えず）",g:byPull.ideal},

      ], closed.length)}
      <div class="rulehint" style="margin-top:10px">複数選択のため割合は決済済み全体に対する「その形を含む割合」。合計は100%にならない。早降り（上ヒゲ・陰線2本目）と5日線割れまで保持で、どちらが伸びているか比較する。</div>
    </div>

    <div style="height:8px"></div>
    <div class="seclabel">バックアップ</div>
    <div style="font-size:12px;color:var(--sub);margin:0 2px 10px">最終バックアップ：${lastBackupDate()||"まだ書き出していない"}</div>
    <button class="btn-secondary" id="st_json" style="margin-bottom:10px">⬇ バックアップを書き出す（JSON・復元用）</button>
    <button class="btn-secondary" id="st_restore" style="margin-bottom:10px">⬆ バックアップから復元する</button>
    <button class="btn-secondary" id="st_csv">⬇ CSVで書き出す（表計算で見る用）</button>
    <div class="smallnote center">記録はこの端末のブラウザ内にだけある。履歴削除や機種変で消えるので、週末などにJSONを書き出してドライブやメールに保管を。消えてもJSONから戻せる。</div>
  </div>`;

  document.getElementById("st_json").onclick=()=>{ exportJSON(trades); renderStats(); };
  document.getElementById("st_restore").onclick=()=>importJSONFile();
  document.getElementById("st_csv").onclick=()=>exportCSV(trades);
}

function barHTML(ratio,color,thin){
  const w=Math.max(0,Math.min(1,ratio))*100;
  return `<div class="bar ${thin?"thin":""}"><span style="width:${w}%;background:${color}"></span></div>`;
}
function plBoxHTML(title,g,total){
  const win=g.sum>=0, col=win?"var(--gain)":"var(--loss)";
  const ratio = total>0 ? Math.round(g.n/total*100) : 0;
  return `<div class="plbox">
    <div style="font-size:12px;color:var(--sub);font-weight:600">${title}</div>
    <div style="font-size:11px;color:var(--sub);margin-top:2px">${g.n}件${total>0?`・${ratio}%`:""}</div>
    <div style="font-family:var(--mono);font-size:26px;font-weight:700;color:var(--ink);margin-top:8px">${g.n===0?"—":Math.round(g.winRate*100)+"%"}</div>
    <div style="font-size:11px;color:var(--sub);margin-top:1px">勝率</div>
    <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:${col};margin-top:8px">${g.n===0?"—":fmtYen(g.sum)}</div>
  </div>`;
}

/* 成績テーブル：見出し行を一度だけ出し、各行は列揃え。割合は表内合計が100%になる */
function gradeTableHTML(rows, fixedTotal){
  const totalN = (typeof fixedTotal==="number") ? fixedTotal : rows.reduce((s,r)=>s+r.g.n,0);
  const head = `<div class="gradehead">
    <span class="gh-label"></span>
    <span class="gh-pct">割合</span>
    <span class="gh-win">勝率</span>
    <span class="gh-pl">損益</span>
  </div>`;
  const body = rows.map((r,i)=>{
    const g=r.g, last=(i===rows.length-1);
    const win=g.sum>=0, col=g.n===0?"var(--sub)":(win?"var(--gain)":"var(--loss)");
    const ratio = totalN>0 ? Math.round(g.n/totalN*100) : 0;
    return `<div class="graderow2" style="${last?"border-bottom:none":""}">
      <span class="gh-label" style="font-size:13px">${r.label}</span>
      <span class="gh-pct" style="font-family:var(--mono);font-size:13px;color:var(--sub)">${totalN>0?ratio+"%":"—"}<span style="font-size:10px;color:var(--sub)"> (${g.n})</span></span>
      <span class="gh-win" style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink)">${g.n===0?"—":Math.round(g.winRate*100)+"%"}</span>
      <span class="gh-pl" style="font-family:var(--mono);font-size:13px;font-weight:600;color:${col}">${g.n===0?"—":fmtYen(g.sum)}</span>
    </div>`;
  }).join("");
  return head+body;
}

/* ---------- ダウンロード共通 ---------- */
function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ---------- CSV ---------- */
function exportCSV(trades){
  const head=["id","side","symbol","entryDate","entryPrice","units","pullback",
    "ruleOrder","ruleSlope","ruleTrigger","ruleCalm","violationCount","isClean",
    "exitDate","exitPrice","plAmount","plPct","heldDays","addedPosition","addReasoned","addReasonNote","exitTriggers","exitOtherNote","note"];
  const e=v=>{ if(v==null) return ""; const s=String(v); return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; };
  const rows=trades.map(t=>{
    const pl=calcPL(t);
    return [t.id,t.side,t.symbol,t.entryDate,t.entryPrice,t.units,t.pullback,
      t.rules.order,t.rules.slope,t.rules.trigger,t.rules.calm,
      violationCount(t.rules),isClean(t.rules),
      t.exitDate||"",t.exitPrice==null?"":t.exitPrice,
      pl?Math.round(pl.amount):"",pl?pl.pct.toFixed(2):"",
      daysBetween(t.entryDate,t.exitDate)??"",
      !!t.addedPosition,!!t.addReasoned,t.addReasonNote||"",exitTrigList(t).join(";"),t.exitOtherNote||"",t.note||""].map(e).join(",");
  });
  const csv="\uFEFF"+[head.join(","),...rows].join("\n");
  downloadBlob(new Blob([csv],{type:"text/csv;charset=utf-8"}), `trade_journal_${todayStr()}.csv`);
  flash("CSVを書き出した");
}

/* ---------- JSON バックアップ書き出し ---------- */
function exportJSON(trades){
  const payload = {
    app:"trade-journal",
    version:1,
    exportedAt:new Date().toISOString(),
    count:trades.length,
    trades:trades,
  };
  const json = JSON.stringify(payload,null,2);
  downloadBlob(new Blob([json],{type:"application/json"}), `trade_journal_backup_${todayStr()}.json`);
  try{ localStorage.setItem("tradeJournalLastBackup", todayStr()); }catch(e){}
  flash("バックアップを書き出した（"+trades.length+"件）");
}
function lastBackupDate(){
  try{ return localStorage.getItem("tradeJournalLastBackup"); }catch(e){ return null; }
}

/* ---------- JSON 復元（統合：同じidは上書き、新規は追加） ---------- */
function importJSONFile(){
  const input=document.createElement("input");
  input.type="file";
  input.accept="application/json,.json";
  input.onchange=()=>{
    const file=input.files&&input.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const data=JSON.parse(reader.result);
        const list = Array.isArray(data) ? data : (data && Array.isArray(data.trades) ? data.trades : null);
        if(!list){ flash("このファイルは読み込めない（形式が違う）"); return; }
        const valid = list.filter(t=> t && typeof t.id==="string" && t.rules);
        if(valid.length===0){ flash("復元できる記録が入っていない"); return; }
        // 既存と突き合わせて、増える件数・上書き件数を出す
        const existingIds=new Set(App.trades.map(t=>t.id));
        let added=0, overwritten=0;
        valid.forEach(t=> existingIds.has(t.id)?overwritten++:added++);
        const ok = confirm(
          `バックアップから復元する。\n`+
          `・新しく追加：${added}件\n`+
          `・同じ記録を上書き：${overwritten}件\n\n`+
          `今ある記録は消えない（同じ記録だけ新しい内容に置き換わる）。実行する？`);
        if(!ok) return;
        await dbPutMany(valid);
        await loadTrades();
        render();
        flash(`復元した（追加${added}・上書き${overwritten}）`);
      }catch(e){
        flash("読み込みに失敗した："+((e&&e.message)||"不明"));
      }
    };
    reader.onerror=()=>flash("ファイルを読めなかった");
    reader.readAsText(file);
  };
  input.click();
}

/* ---------- 空状態 ---------- */
function emptyHTML(title,body){
  return `<div class="empty"><div class="empty-t">${esc(title)}</div><div class="empty-b">${esc(body)}</div></div>`;
}

/* ---------- PWA: マニフェストを動的に挿入（別ファイル不要） ---------- */
function installManifest(){
  try{
    const icon = document.querySelector('link[rel="apple-touch-icon"]').getAttribute("href");
    const manifest = {
      name:"トレード記録", short_name:"トレード記録",
      start_url:".", scope:".", display:"standalone",
      background_color:"#F6F1E7", theme_color:"#F6F1E7",
      icons:[
        {src:icon, sizes:"180x180", type:"image/svg+xml", purpose:"any"},
        {src:icon, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"},
      ],
    };
    const blob = new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    const link = document.createElement("link");
    link.rel="manifest"; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){ /* マニフェスト挿入失敗は致命的でない */ }
}

/* ============================================================
   起動

$tabs.querySelectorAll(".tab").forEach(b=>b.onclick=()=>go(b.dataset.screen));

(async function init(){
  installManifest();
  render(); // 読み込み中表示
  try{ await loadTrades(); }catch(e){}
  App.loaded=true;
  render();
})();
</script>
